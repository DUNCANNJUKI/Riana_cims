services:
  database:
    image: mysql:8.4
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DATABASE_NAME:-riana_cims}
      MYSQL_USER: ${DATABASE_USER:-riana_cims}
      MYSQL_PASSWORD: ${DATABASE_PASSWORD:?Set DATABASE_PASSWORD}
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:?Set MYSQL_ROOT_PASSWORD}
    volumes:
      - riana_mysql:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h localhost -p$$MYSQL_ROOT_PASSWORD"]
      interval: 10s
      timeout: 5s
      retries: 12

  app:
    build: .
    restart: unless-stopped
    env_file: .env.local
    environment:
      DATABASE_HOST: database
      DATABASE_PORT: 3306
      VITE_API_PORT: 8081
    depends_on:
      database:
        condition: service_healthy
    ports:
      - "8081:8081"
    volumes:
      - ./server/backups:/app/server/backups
      - ./server/uploads:/app/server/uploads

volumes:
  riana_mysql:
